<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Press | UCN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Tu configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyB-v2v7zG-U7uE9uE9uE9uE9uE9uE9uE",
            authDomain: "eco-press-ucn.firebaseapp.com",
            projectId: "eco-press-ucn",
            storageBucket: "eco-press-ucn.appspot.com",
            messagingSenderId: "1056565191060",
            appId: "1:1056565191060:web:964e6e6e6e6e6e6e6e6e6e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.registrarDatos = async () => {
            const rutInput = document.getElementById('rut').value;
            const status = document.getElementById('statusMessage');

            if (!rutInput) return;

            status.classList.remove('hidden');
            status.textContent = "Registrando reciclaje...";
            status.className = "mt-6 p-4 rounded-lg text-center font-medium bg-blue-100 text-blue-700";

            try {
                await addDoc(collection(db, "reciclaje"), {
                    rut: rutInput,
                    fecha: serverTimestamp(),
                    latas: 1 // Por ahora sumamos de a 1, luego lo vinculamos al sensor
                });
                status.textContent = "¡Éxito! Latas registradas correctamente.";
                status.className = "mt-6 p-4 rounded-lg text-center font-medium bg-green-100 text-green-700";
                document.getElementById('rut').value = "";
            } catch (e) {
                console.error("Error: ", e);
                status.textContent = "Error al conectar. Revisa tu conexión.";
                status.className = "mt-6 p-4 rounded-lg text-center font-medium bg-red-100 text-red-700";
            }
        };
    </script>
</head>
<body class="flex items-center justify-center min-h-screen p-4 bg-gray-100">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-green-600 uppercase tracking-wider">Eco-Press</h1>
            <p class="text-gray-500 mt-2">Ingresa tu RUT para sumar puntos</p>
        </div>

        <form id="ecoForm" onsubmit="event.preventDefault(); registrarDatos();" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700">RUT del Usuario</label>
                <input type="text" id="rut" placeholder="12.345.678-9" required
                    class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:ring-green-500 focus:border-green-500 text-lg">
            </div>
            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow-lg uppercase transition">
                Registrar Latas
            </button>
        </form>
        <div id="statusMessage" class="hidden mt-6 p-4 rounded-lg text-center font-medium"></div>
    </div>
</body>
</html>
